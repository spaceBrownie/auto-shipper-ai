    WebhookAuthenticationNote:
      type: object
      x-cj-verified: unverified
      description: |
        CJ webhook documentation does NOT specify any authentication mechanism for
        incoming webhook requests. The following are NOT documented:
        - Bearer token in Authorization header
        - HMAC signature verification
        - Custom authentication headers

        Our CjWebhookTokenVerificationFilter uses Bearer token authentication as a
        defensive measure, but this is NOT verified against CJ's actual behavior.
        CJ may or may not send an Authorization header with webhooks.

        Until verified (e.g., by registering a webhook endpoint and inspecting the
        actual headers CJ sends), this remains unverified.
