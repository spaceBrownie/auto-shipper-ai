    VariantByVidResponse:
      allOf:
        - $ref: '#/components/schemas/StandardSuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Variant'
      description: Returns a single Variant object (not an array). When features=enable_inventory is passed, the variant's `inventories` field is populated with per-country inventory data.
    InventoryStock:
      type: object
      properties:
        stockId:
          type: string
        inventory:
          type: integer
        factoryInventory:
          type: integer
      additionalProperties: true
    InventoryWarehouse:
      type: object
      description: |
        Inventory record per warehouse/country. Used in queryByVid (stock endpoint), queryBySku, and getInventoryByPid top-level inventories.
        Note: queryByVid uses `*Num`-suffixed fields; getInventoryByPid's variantInventories uses unprefixed field names. Both shapes are captured here.
      properties:
        areaId:
          description: Integer in most contexts, string "1"/"2" in stock/queryByVid response.
          oneOf:
            - type: integer
            - type: string
        areaEn:
          type: string
          description: Warehouse area name in English (e.g. "China Warehouse", "US Warehouse").
        countryCode:
          type: string
        countryNameEn:
          type: string
        storageNum:
          type: integer
          description: Present in stock/queryByVid — same as totalInventoryNum.
        totalInventoryNum:
          type: integer
          description: Total inventory count (used in stock/queryByVid and queryBySku responses).
        cjInventoryNum:
          type: integer
          description: CJ-owned inventory count (used in stock/queryByVid and queryBySku responses).
        factoryInventoryNum:
          type: integer
          description: Factory/supplier inventory count (used in stock/queryByVid and queryBySku responses).
        totalInventory:
          type: integer
          description: Total inventory count (used in variantInventories[].inventory[] within getInventoryByPid).
        cjInventory:
          type: integer
          description: CJ-owned inventory count (used in getInventoryByPid and Variant.inventories).
        factoryInventory:
          type: integer
          description: Factory inventory count (used in getInventoryByPid and Variant.inventories).
        verifiedWarehouse:
          type: integer
          enum: [1, 2]
          description: 1=verified, 2=unverified.
        stock:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/InventoryStock'
      additionalProperties: true
    InventoryWarehouseByVid:
      type: object
      description: Per-country inventory shape used inside Variant.inventories (from queryByVid with enable_inventory, and getInventoryByPid variantInventories).
      properties:
        countryCode:
          type: string
        totalInventory:
          type: integer
        cjInventory:
          type: integer
        factoryInventory:
          type: integer
        verifiedWarehouse:
          type: integer
          enum: [1, 2]
        stock:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/InventoryStock'
      additionalProperties: true
    InventoryByVidResponse:
      allOf:
        - $ref: '#/components/schemas/StandardSuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              description: Each item is an InventoryWarehouse with an added `vid` field at top level.
              items:
                allOf:
                  - $ref: '#/components/schemas/InventoryWarehouse'
                  - type: object
                    properties:
                      vid:
                        type: string
    InventoryBySkuResponse:
      allOf:
        - $ref: '#/components/schemas/StandardSuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              description: Array of per-warehouse inventory records (same shape as InventoryWarehouse with *Num-suffixed counts).
              items:
                $ref: '#/components/schemas/InventoryWarehouse'
      description: Returns an array of warehouse inventory records (not an object as previously marked). Each item has areaId (integer), areaEn, countryCode, countryNameEn, totalInventoryNum, cjInventoryNum, factoryInventoryNum, stock.
    InventoryByPidResponse:
      type: object
      description: |
        This endpoint uses a different success envelope from most product endpoints:
        `success` (boolean) + `code` (integer) instead of `result`. Also has `message: ""` (empty string, not null).
        The `data` object contains both a top-level `inventories` array (per-warehouse totals across all variants)
        and a `variantInventories` array (per-variant per-warehouse breakdown).
      properties:
        success:
          type: boolean
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          properties:
            inventories:
              type: array
              description: Aggregate inventory per warehouse across all variants.
              items:
                type: object
                properties:
                  areaId:
                    type: integer
                  areaEn:
                    type: string
                  countryCode:
                    type: string
                  countryNameEn:
                    type: string
                  totalInventoryNum:
                    type: integer
                  cjInventoryNum:
                    type: integer
                  factoryInventoryNum:
                    type: integer
                  stock:
                    nullable: true
                    type: array
                    items:
                      $ref: '#/components/schemas/InventoryStock'
                additionalProperties: true
            variantInventories:
              type: array
              items:
                type: object
                properties:
                  vid:
                    type: string
                  inventory:
                    type: array
                    items:
                      $ref: '#/components/schemas/InventoryWarehouseByVid'
                additionalProperties: true
          additionalProperties: true
        requestId:
          type: string
      additionalProperties: true
    ProductCommentsResponse:
      type: object
      description: |
        Reviews endpoint response. Live verification of /product/productComments shows the STANDARD
        envelope with `result` (boolean), not the `success`-only variant described in some CJ docs.
        Both `result` and `success` are present in the live response. `pageNum`, `pageSize`, and
        `total` in `data` are integers in the live response (not strings as shown in some CJ examples).
      properties:
        code:
          type: integer
        result:
          type: boolean
        success:
          type: boolean
          description: Also present alongside `result` in the live response.
        message:
          nullable: true
          type: string
        data:
          type: object
          properties:
            pageNum:
              type: integer
              description: Current page number (integer in live response, despite some docs showing string).
            pageSize:
              type: integer
              description: Page size (integer in live response).
            total:
              type: integer
              description: Total number of reviews (integer in live response).
            list:
              type: array
              items:
                type: object
                properties:
                  commentId:
                    type: integer
                    format: int64
                  pid:
                    type: string
                  comment:
                    type: string
                  commentDate:
                    type: string
                  commentUser:
                    type: string
                  score:
                    type: string
                  commentUrls:
                    type: array
                    items:
                      type: string
                  countryCode:
                    type: string
                  flagIconUrl:
                    type: string
                additionalProperties: true
        requestId:
          type: string
      additionalProperties: true
    SourcingItem:
      type: object
      description: A single sourcing request record returned by /product/sourcing/query.
      properties:
        sourceId:
          type: string
          description: CJ internal sourcing request ID (numeric string).
        sourceNumber:
          type: string
          description: Human-readable sourcing request number (e.g. "CJSPU956715970").
        productId:
          type: string
          description: Associated product ID (numeric string, may differ from CJ product UUID).
        variantId:
          type: string
          description: Associated variant ID (numeric string).
        shopId:
          type: string
          description: CJ shop/account ID (numeric string).
        shopName:
          type: string
          description: Name of the CJ shop that submitted the sourcing request.
        sourceStatus:
          type: string
          description: |
            Sourcing status as a string-encoded integer.
            Known values: "12" = Pending. Other values undocumented.
        sourceStatusStr:
          type: string
          description: Human-readable status string (e.g. "Pending").
        cjProductId:
          type: string
          description: CJ product ID after sourcing completes. Empty string while pending.
        cjVariantSku:
          nullable: true
          type: string
          description: CJ variant SKU after sourcing completes. Null while pending.
      additionalProperties: true
    SourcingQueryResponse:
      type: object
      description: |
        Response for /product/sourcing/query. Uses the standard `result` envelope.
        When a single sourceId is queried, `data` is a single SourcingItem object (not an array).
      properties:
        code:
          type: integer
        result:
          type: boolean
        success:
          type: boolean
        message:
          nullable: true
          type: string
        data:
          $ref: '#/components/schemas/SourcingItem'
        requestId:
          type: string
      additionalProperties: true
    CreateSourcingRequest:
      type: object
      required: [productName, productImage]
      properties:
        thirdProductId:
          type: string
        thirdVariantId:
          type: string
        thirdProductSku:
          type: string
        productName:
          type: string
        productImage:
          type: string
        productUrl:
          type: string
        remark:
          type: string
        price:
          oneOf:
            - type: string
            - type: number
      additionalProperties: false
    CreateSourcingResponse:
      type: object
      description: |
        Live response uses the STANDARD `result` envelope (code/result/message/data/requestId/success),
        not the `success`-only variant described in some CJ docs.
      properties:
        code:
          type: integer
        result:
          type: boolean
          description: Standard CJ success flag.
        success:
          type: boolean
          description: Also present alongside `result` in the live response.
        message:
          nullable: true
          type: string
        data:
          type: object
          properties:
            cjSourcingId:
              type: string
              description: CJ internal sourcing request ID (numeric string).
            sourceNumber:
              type: string
              description: Human-readable sourcing request number (e.g. "CJSPU956715970").
            result:
              type: string
              description: String "success" on success.
        requestId:
          type: string
      additionalProperties: true
