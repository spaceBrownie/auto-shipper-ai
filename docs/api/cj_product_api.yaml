        packingKey:
          type: string
        packingKeySet:
          type: array
          items:
            type: string
        productKey:
          type: string
          description: JSON array string of variant property keys in Chinese (e.g. "[\"颜色\"]").
        productKeySet:
          type: array
          items:
            type: string
        productKeyEn:
          type: string
