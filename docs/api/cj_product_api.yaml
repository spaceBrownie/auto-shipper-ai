openapi: 3.0.3
info:
  title: CJ Dropshipping Product API
  version: '1.0.0'
  description: |
    OpenAPI-style YAML derived from the CJ Dropshipping Product docs page.

    Source page:
    https://developers.cjdropshipping.cn/en/api/api2/api/product.html

    Notes:
      - This spec was transcribed from the HTML docs and validated for YAML syntax.
      - It documents the Product section endpoints shown on the page.
      - Some CJ examples are internally inconsistent or malformed in the HTML docs; those cases are preserved as notes under `description` or `x-cj-doc-notes` rather than silently normalized.
      - Authentication is modeled as the required `CJ-Access-Token` header.
servers:
  - url: https://developers.cjdropshipping.com/api2.0/v1
security:
  - cjAccessToken: []
tags:
  - name: Product Categories
  - name: Products
  - name: Variants
  - name: Inventory
  - name: Product Reviews
  - name: Sourcing
paths:
  /product/getCategory:
    get:
      tags: [Product Categories]
      summary: Category List
      operationId: getProductCategories
      description: Get product categories from CJ.
      responses:
        '200':
          description: Success wrapper from CJ docs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
              example:
                code: 200
                result: true
                message: Success
                data:
                  - categoryFirstName: Computer & Office
                    categoryFirstList:
                      - categorySecondName: Office Electronics
                        categorySecondList:
                          - categoryId: 2252588B-72E3-4397-8C92-7D9967161084
                            categoryName: Office & School Supplies
                requestId: ae543fd1-cdd7-4a61-974a-1340fea678c6
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '1.1 Category List(GET)'
  /product/listV2:
    get:
      tags: [Products]
      summary: Product List V2
      operationId: listProductsV2
      description: |
        Get all available products from CJ with criteria inquiry supported.
        The docs say V2 uses Elasticsearch for higher performance search.

        Doc notes:
          - Supports keyword search.
          - Supports multiple filters such as price range, category, and country.
          - Supports sorting.
          - `features` can selectively return extra product details and category information.
          - `page` min 1 max 1000; `size` min 1 max 100.
      parameters:
        - $ref: '#/components/parameters/keyWord'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 1000
          description: Page number.
        - name: size
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          description: Quantity of results on each page.
        - name: categoryId
          in: query
          schema:
            type: string
          description: Filter products by third level category ID.
        - name: lv2categoryList
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Second level category ID list.
        - name: lv3categoryList
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Third level category ID list.
        - name: countryCode
          in: query
          schema:
            type: string
          description: 'Country code such as CN, US, GB, FR. Filters products with inventory in the specified countries.'
        - name: startSellPrice
          in: query
          schema:
            type: number
            format: decimal
          description: Price filter start value.
        - name: endSellPrice
          in: query
          schema:
            type: number
            format: decimal
          description: Price filter end value.
        - name: addMarkStatus
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: 0 = not free shipping, 1 = free shipping.
        - name: productType
          in: query
          schema:
            type: integer
            enum: [4, 10, 11]
          description: 4 = Supplier product, 10 = Video product, 11 = Non-video product.
        - name: productFlag
          in: query
          schema:
            type: integer
            enum: [0, 1, 2, 3]
          description: 0 = Trending, 1 = New, 2 = Video, 3 = Slow-moving.
        - name: startWarehouseInventory
          in: query
          schema:
            type: integer
          description: Inventory greater than or equal to this value.
        - name: endWarehouseInventory
          in: query
          schema:
            type: integer
          description: Inventory less than or equal to this value.
        - name: verifiedWarehouse
          in: query
          schema:
            type: integer
            enum: [0, 1, 2]
          description: null/0 = All(default), 1 = Verified inventory, 2 = Unverified inventory.
        - name: timeStart
          in: query
          schema:
            type: integer
            format: int64
          description: Listing start time timestamp in milliseconds.
        - name: timeEnd
          in: query
          schema:
            type: integer
            format: int64
          description: Listing end time timestamp in milliseconds.
        - name: zonePlatform
          in: query
          schema:
            type: string
          description: 'Suggested platform such as shopify, ebay, amazon, tiktok, etsy.'
        - name: isWarehouse
          in: query
          schema:
            type: boolean
          description: true = yes, false = no.
        - name: sort
          in: query
          schema:
            type: string
            enum: [desc, asc]
            default: desc
          description: Sort direction.
        - name: orderBy
          in: query
          schema:
            type: integer
            enum: [0, 1, 2, 3, 4]
            default: 0
          description: 0 = best match, 1 = listing count, 2 = sell price, 3 = create time, 4 = inventory.
        - name: features
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - enable_description
                - enable_category
                - enable_combine
                - enable_video
          style: form
          explode: true
          description: Controls optional extra fields in the response.
        - name: supplierId
          in: query
          schema:
            type: string
          description: Filter products by supplier ID.
        - name: hasCertification
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: 0 = No, 1 = Yes.
        - name: isSelfPickup
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: 0 = No, 1 = Yes.
        - name: customization
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: 0 = No, 1 = Yes.
      responses:
        '200':
          description: Product list V2 response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListV2Response'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '1.2 Product List V2(GET)'
  /product/globalWarehouseList:
    get:
      tags: [Products]
      summary: Global Warehouse List
      operationId: listGlobalWarehouses
      description: Get the list of all available global warehouses.
      responses:
        '200':
          description: Global warehouse list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalWarehouseListResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '1.3 Global Warehouse List(GET)'
  /product/list:
    get:
      tags: [Products]
      summary: Product List
      operationId: listProducts
      description: |
        Get all available products from CJ with criteria inquiry supported.

        Doc notes:
          - Docs say 20 results for each page, fixed.
          - Same docs also say maximum return is 200 per page, and `pageSize` defaults to 20 with max 200.
          - Free users or v1 users are limited to 1000 requests/day and one IP is limited to three users.
          - `deliveryTime` was added per docs on 2024-11-15 with values 24, 48, 72, or null.
      parameters:
        - name: pageNum
          in: query
          schema:
            type: integer
            default: 1
          description: Page number.
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            maximum: 200
          description: Number of products returned per page.
        - name: categoryId
          in: query
          schema:
            type: string
          description: Filter products by category ID.
        - name: pid
          in: query
          schema:
            type: string
          description: Filter by unique product identifier.
        - name: productSku
          in: query
          schema:
            type: string
          description: Filter by product SKU.
      responses:
        '200':
          description: Product list response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '1.4 Product List(GET)'
      x-cj-doc-notes:
        - The HTML page contains contradictory pagination wording; this spec preserves both facts in the description instead of guessing.
  /product/query:
    get:
      tags: [Products]
      summary: Product Details
      operationId: getProductDetails
      description: Query a single product by one of pid, productSku, or variantSku.
      parameters:
        - name: pid
          in: query
          schema:
            type: string
          description: Unique product identifier. Choose one of pid, productSku, or variantSku.
        - name: productSku
          in: query
          schema:
            type: string
          description: Product SPU code. Choose one of pid, productSku, or variantSku.
        - name: variantSku
          in: query
          schema:
            type: string
          description: Variant SKU code. Choose one of pid, productSku, or variantSku.
      responses:
        '200':
          description: Product details response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailsResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '1.3 Product Details(GET)'
  /product/addToMyProduct:
    post:
      tags: [Products]
      summary: Add to My Product
      operationId: addToMyProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId:
                  type: string
                  maxLength: 100
                  description: CJ product id.
            example:
              productId: '1658748072937136128'
      responses:
        '200':
          description: Standard CJ success wrapper. The HTML page does not show a detailed success payload here.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSuccessEnvelope'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-doc-source:
        page: product.html
        section: '1.4 Add to My Product (POST)'
      x-cj-doc-notes:
        - The cURL example on the page uses localhost instead of the public host. The URL section shows the real endpoint.
  /product/myProduct/query:
    get:
      tags: [Products]
      summary: My Product List
      operationId: listMyProducts
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
          description: SKU, SPU, or product name.
        - name: categoryId
          in: query
          schema:
            type: string
        - name: startAt
          in: query
          schema:
            type: string
        - name: endAt
          in: query
          schema:
            type: string
          description: The docs spell this note as `ent time`.
        - name: isListed
          in: query
          schema:
            type: integer
        - name: visiable
          in: query
          schema:
            type: integer
          description: Field name follows CJ docs typo.
        - name: hasPacked
          in: query
          schema:
            type: integer
        - name: hasVirPacked
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: My product list response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyProductListResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-doc-source:
        page: product.html
        section: '1.3 My Product List(GET)'
  /product/variant/query:
    get:
      tags: [Variants]
      summary: Inquiry Of All Variants
      operationId: queryAllVariants
      parameters:
        - name: pid
          in: query
          schema:
            type: string
          description: Choose one of pid, productSku, or variantSku.
        - name: productSku
          in: query
          schema:
            type: string
          description: Choose one of pid, productSku, or variantSku.
        - name: variantSku
          in: query
          schema:
            type: string
          description: Choose one of pid, productSku, or variantSku.
        - name: countryCode
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
          description: If passed, only variants with inventory in that country will be returned.
      responses:
        '200':
          description: Variant list response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariantListResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '2.1 Inquiry Of All Variants (GET)'
  /product/variant/queryByVid:
    get:
      tags: [Variants]
      summary: Variant Id Inquiry
      operationId: queryVariantByVid
      parameters:
        - name: vid
          in: query
          required: true
          schema:
            type: string
          description: Variant ID.
        - name: features
          in: query
          schema:
            type: string
            enum: [enable_inventory]
          description: Includes inventory and returns variant inventory info including storage id.
      responses:
        '200':
          description: Variant detail by vid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VariantByVidResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '2.2 Variant Id Inquiry (GET)'
  /product/stock/queryByVid:
    get:
      tags: [Inventory]
      summary: Inventory Inquiry
      operationId: queryInventoryByVid
      parameters:
        - name: vid
          in: query
          required: true
          schema:
            type: string
          description: Unique variant identifier.
      responses:
        '200':
          description: Inventory list for the variant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryByVidResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '3.1 Inventory Inquiry(GET)'
  /product/stock/queryBySku:
    get:
      tags: [Inventory]
      summary: Query Inventory by SKU
      operationId: queryInventoryBySku
      parameters:
        - name: sku
          in: query
          required: true
          schema:
            type: string
          description: SKU or SPU.
      responses:
        '200':
          description: Inventory by SKU response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryBySkuResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '3.2 Query Inventory by SKU (GET)'
  /product/stock/getInventoryByPid:
    get:
      tags: [Inventory]
      summary: Query inventory by product ID
      operationId: queryInventoryByPid
      parameters:
        - name: pid
          in: query
          required: true
          schema:
            type: string
            maxLength: 40
          description: Product Id.
      responses:
        '200':
          description: Inventory by product id response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryByPidResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-verified: true
      x-cj-doc-source:
        page: product.html
        section: '3.3 Query inventory by product ID (GET)'
  /product/comments:
    get:
      tags: [Product Reviews]
      summary: Inquiry Reviews (deprecated)
      operationId: queryProductCommentsDeprecated
      description: |
        Deprecated product review endpoint.

        Doc warning: "Will be deprecated on June 1, 2024, Please use the new api Inquiry Reviews".
      parameters:
        - $ref: '#/components/parameters/reviewPid'
        - $ref: '#/components/parameters/reviewScore'
        - $ref: '#/components/parameters/reviewPageNum'
        - $ref: '#/components/parameters/reviewPageSize'
      responses:
        '200':
          description: Review list response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCommentsResponse'
        default:
          $ref: '#/components/responses/StandardError'
      deprecated: true
      x-cj-doc-source:
        page: product.html
        section: '4.1 Inquiry Reviews (GET)'
  /product/productComments:
    get:
      tags: [Product Reviews]
      summary: Inquiry Reviews
      operationId: queryProductComments
      parameters:
        - $ref: '#/components/parameters/reviewPid'
        - $ref: '#/components/parameters/reviewScore'
        - $ref: '#/components/parameters/reviewPageNum'
        - $ref: '#/components/parameters/reviewPageSize'
      responses:
        '200':
          description: Review list response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCommentsResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-doc-source:
        page: product.html
        section: '4.2 Inquiry Reviews (GET)'
  /product/sourcing/create:
    post:
      tags: [Sourcing]
      summary: Create Sourcing
      operationId: createSourcing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourcingRequest'
            example:
              thirdProductId: ''
              thirdVariantId: ''
              thirdProductSku: ''
              productName: ''
              productImage: ''
              productUrl: ''
              remark: ''
              price: ''
      responses:
        '200':
          description: Create sourcing response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSourcingResponse'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-doc-source:
        page: product.html
        section: '5.1 Create Sourcing (POST)'
      x-cj-doc-notes:
        - The docs mark `price` as BigDecimal but do not clearly mark it Y/N in the parameter table.
        - The success example in the HTML is malformed JSON; this schema models the intended structure.
  /product/sourcing/query:
    post:
      tags: [Sourcing]
      summary: Query Sourcing
      operationId: querySourcing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceIds]
              properties:
                sourceIds:
                  type: array
                  items:
                    type: string
                  description: CJ sourcing ids.
            example:
              sourceIds: []
      responses:
        '200':
          description: Query sourcing response. The docs page shows the request parameter but not a fully structured success schema in the visible excerpt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSuccessEnvelope'
        default:
          $ref: '#/components/responses/StandardError'
      x-cj-doc-source:
        page: product.html
        section: '5.2 Query Sourcing(POST)'
components:
  securitySchemes:
    cjAccessToken:
      type: apiKey
      in: header
      name: CJ-Access-Token
  parameters:
    keyWord:
      name: keyWord
      in: query
      schema:
        type: string
      description: Product name or SKU keyword search.
    reviewPid:
      name: pid
      in: query
      required: true
      schema:
        type: string
      description: Product id.
    reviewScore:
      name: score
      in: query
      schema:
        type: integer
      description: Review score filter.
    reviewPageNum:
      name: pageNum
      in: query
      schema:
        type: integer
        default: 1
      description: Page number.
    reviewPageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
      description: Page size.
  responses:
    StandardError:
      description: Standard CJ error wrapper.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorEnvelope'
          example:
            code: 1600100
            result: false
            message: Param error
            data: null
            requestId: 323fda9d-3c94-41dc-a944-5cc1b8baf5b1
  schemas:
    StandardSuccessEnvelope:
      type: object
      properties:
        code:
          type: integer
        result:
          type: boolean
        message:
          type: string
          nullable: true
        data:
          nullable: true
        requestId:
          type: string
      additionalProperties: true
    StandardErrorEnvelope:
      type: object
      required: [code, result, message, data, requestId]
      properties:
        code:
          type: integer
        result:
          type: boolean
        message:
          type: string
        data:
          nullable: true
        requestId:
          type: string
    CategoryLevel3:
      type: object
      properties:
        categoryId:
          type: string
        categoryName:
          type: string
    CategoryLevel2:
      type: object
      properties:
        categorySecondId:
          type: string
          description: Level-2 category UUID.
        categorySecondName:
          type: string
        categorySecondList:
          type: array
          items:
            $ref: '#/components/schemas/CategoryLevel3'
    CategoryLevel1:
      type: object
      properties:
        categoryFirstId:
          type: string
          description: Level-1 category UUID.
        categoryFirstName:
          type: string
        categoryFirstList:
          type: array
          items:
            $ref: '#/components/schemas/CategoryLevel2'
    CategoryListResponse:
      allOf:
        - $ref: '#/components/schemas/StandardSuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CategoryLevel1'
    ProductListV2Response:
      allOf:
        - $ref: '#/components/schemas/StandardSuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                pageSize:
                  type: integer
                  format: int64
                pageNumber:
                  type: integer
                  format: int64
                totalRecords:
                  type: integer
                  format: int64
                totalPages:
                  type: integer
                  format: int64
                content:
                  type: array
                  items:
                    type: object
                    properties:
                      productList:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProductV2'
                      relatedCategoryList:
                        type: array
                        items:
                          type: object
                          properties:
                            categoryId:
                              type: string
                            categoryName:
                              type: string
                      keyWord:
                        type: string
                      keyWordOld:
                        type: string
    ProductV2:
      type: object
      properties:
        id:
          type: string
        nameEn:
          type: string
        sku:
          type: string
        spu:
          nullable: true
          type: string
        bigImage:
          type: string
        sellPrice:
          type: string
        nowPrice:
          nullable: true
          type: string
        discountPrice:
          nullable: true
          type: string
        discountPriceRate:
          nullable: true
          type: string
        listedNum:
          type: integer
        isCollect:
          type: integer
          enum: [0, 1]
        categoryId:
          type: string
        threeCategoryName:
          nullable: true
          type: string
        twoCategoryId:
          nullable: true
          type: string
        twoCategoryName:
          nullable: true
          type: string
        oneCategoryId:
          nullable: true
          type: string
        oneCategoryName:
          nullable: true
          type: string
        addMarkStatus:
          type: integer
          enum: [0, 1]
        isVideo:
          type: integer
          enum: [0, 1]
          description: Alias for isVedio (CJ API returns both; isVideo is the canonical one).
        isVedio:
          type: integer
          enum: [0, 1]
          description: CJ API typo — same as isVideo. Both fields are present in the response.
        videoList:
          type: array
          items:
            type: string
        productType:
          type: string
        supplierName:
          nullable: true
          type: string
        createAt:
          nullable: true
          type: integer
          format: int64
        setRecommendedTime:
          nullable: true
          type: integer
          format: int64
        warehouseInventoryNum:
          type: integer
          format: int64
        totalVerifiedInventory:
          type: integer
        totalUnVerifiedInventory:
          nullable: true
          type: integer
        verifiedWarehouse:
          type: integer
          enum: [1, 2]
        customization:
          nullable: true
          type: integer
          enum: [0, 1]
        isPersonalized:
          type: integer
          enum: [0, 1]
