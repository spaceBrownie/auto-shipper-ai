spring:
  application:
    name: auto-shipper-ai
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: false

logging:
  level:
    com.autoshipper: INFO
    org.springframework: WARN

resilience4j:
  circuitbreaker:
    instances:
      ups-rate:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      fedex-rate:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      usps-rate:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      stripe-fee:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      shopify-fee:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      ups-rate:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      fedex-rate:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      usps-rate:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      stripe-fee:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      shopify-fee:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      shopify-price-sync:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

ups:
  api:
    base-url: ${UPS_API_BASE_URL:https://onlinetools.ups.com}
    client-id: ${UPS_CLIENT_ID:}
    client-secret: ${UPS_CLIENT_SECRET:}

fedex:
  api:
    base-url: ${FEDEX_API_BASE_URL:https://apis.fedex.com}
    client-id: ${FEDEX_CLIENT_ID:}
    client-secret: ${FEDEX_CLIENT_SECRET:}

usps:
  api:
    base-url: ${USPS_API_BASE_URL:https://api.usps.com}
    oauth-token: ${USPS_OAUTH_TOKEN:}

stripe:
  api:
    base-url: ${STRIPE_API_BASE_URL:https://api.stripe.com}
    secret-key: ${STRIPE_SECRET_KEY:}

shopify:
  api:
    base-url: ${SHOPIFY_API_BASE_URL:https://mystore.myshopify.com}
    access-token: ${SHOPIFY_ACCESS_TOKEN:}
  platform:
    estimated-order-value: ${SHOPIFY_ESTIMATED_ORDER_VALUE:100.00}

pricing:
  margin-floor-percent: 30
  conversion-threshold-percent: 15
  max-price-multiplier: 2.0

stress-test:
  shipping-multiplier: 2.0
  cac-increase-percent: 15
  supplier-increase-percent: 10
  refund-rate-percent: 5
  chargeback-rate-percent: 2
  gross-margin-floor-percent: 50
  net-margin-floor-percent: 30

capital:
  net-margin-floor-percent: 30
  sustained-days: 7
  refund-rate-max-percent: 5
  chargeback-rate-max-percent: 2
  cac-variance-max-percent: 15
  cac-variance-days: 14
  reserve-rate-min-percent: 10
  reserve-rate-max-percent: 15

# Portfolio orchestration — experiment lifecycle, kill window monitoring, reallocation
portfolio:
  kill-window-days: 30
  kpi-cache-ttl-minutes: 5
  # Feature flag: when false (default), KillWindowMonitor writes advisory recommendations only.
  # When true, it also emits KillWindowBreached events that auto-terminate SKUs.
  auto-terminate-enabled: false

# Demand Scan Job (FR-016) — autonomous deal sourcing
demand-scan:
  enabled: true
  cooldown-hours: 20
  validation-window-days: 30
  scoring-weights:
    demand: 0.4
    margin-potential: 0.35
    competition: 0.25
  scoring-threshold: 0.6
  dedup-similarity-threshold: 0.7

# API keys for demand signal providers
cj-dropshipping:
  api:
    base-url: ${CJ_API_BASE_URL:https://developers.cjdropshipping.com/api2.0/v1}
    access-token: ${CJ_ACCESS_TOKEN:}

# YouTube Data API v3
youtube:
  api:
    base-url: ${YOUTUBE_API_BASE_URL:https://www.googleapis.com/youtube/v3}
    key: ${YOUTUBE_API_KEY:}
    search-terms:
      - "best product review"
      - "product unboxing 2026"
      - "top gadgets"
      - "must have kitchen gadgets"
    max-results-per-search: 10

# Reddit API
reddit:
  api:
    base-url: ${REDDIT_API_BASE_URL:https://oauth.reddit.com}
    auth-url: ${REDDIT_AUTH_URL:https://www.reddit.com/api/v1/access_token}
    client-id: ${REDDIT_CLIENT_ID:}
    client-secret: ${REDDIT_CLIENT_SECRET:}
    user-agent: ${REDDIT_USER_AGENT:AutoShipperAI/1.0}
    subreddits:
      - BuyItForLife
      - shutupandtakemymoney
      - gadgets
      - homeautomation
    sort: hot
    limit-per-subreddit: 25

# Amazon Creators API (deactivated — PA-API 5.0 deprecated May 2026)
amazon-creators:
  enabled: false
  api:
    base-url: ${AMAZON_CREATORS_API_BASE_URL:https://api.amazon.com}
    credential-id: ${AMAZON_CREDENTIAL_ID:}
    credential-secret: ${AMAZON_CREDENTIAL_SECRET:}
    partner-tag: ${AMAZON_PARTNER_TAG:}
    marketplace: ${AMAZON_MARKETPLACE:www.amazon.com}

google-trends:
  rss:
    geo: ${GOOGLE_TRENDS_GEO:US}

# Compliance Guards (FR-011)
# auto-check-enabled=false disables automatic trigger on SKU creation (development use only)
compliance:
  llm-enabled: false
  auto-check-enabled: true
  sanctions-list-path: classpath:compliance/sanctions-list.txt
  prohibited-categories-path: classpath:compliance/prohibited-categories.txt
