spring:
  application:
    name: auto-shipper-ai
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/autoshipper}
    username: ${DB_USERNAME:autoshipper}
    password: ${DB_PASSWORD:autoshipper}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.autoshipper: INFO
    org.springframework: WARN
